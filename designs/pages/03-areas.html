<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeOS — Areas</title>
<link rel="stylesheet" href="../assets/lifeos.css">
<style>
  .areas-head{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:22px;flex-wrap:wrap}
  .areas-head h1{font-size:26px;font-weight:600;letter-spacing:-.02em}
  .areas-head .sub{color:var(--ink-3);font-size:14px;margin-top:3px}
  /* balance spectrum */
  .spectrum{background:var(--surface);border:1px solid var(--line-2);border-radius:var(--r-lg);padding:18px 22px 14px;margin-bottom:20px;position:relative;overflow:hidden}
  .spectrum::before{content:"";position:absolute;top:-70px;left:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,var(--i50),transparent 70%)}
  .spec-h{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;margin-bottom:20px}
  .spec-h h2{font-size:14px;font-weight:600;white-space:nowrap}
  .spec-h .sx{font-size:12px;color:var(--ink-3)}
  .spec-track{position:relative;height:60px;border-radius:12px;margin:0 6px;
    background:linear-gradient(90deg,#FBE7E5 0 30%,#FBEDDF 30% 50%,#F8F0DC 50% 70%,#E6F4ED 70% 100%)}
  .spec-chip{position:absolute;transform:translate(-50%,-50%);z-index:2;cursor:pointer;transition:transform .18s}
  .spec-chip:hover{z-index:6}
  .spec-chip .ci{width:38px;height:38px;border-radius:50%;background:var(--surface);border:2.5px solid var(--col);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 3px 9px rgba(13,40,38,.16);transition:.18s}
  .spec-chip:hover .ci{transform:scale(1.14)}
  .spec-chip .tip{position:absolute;bottom:44px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:11px;font-weight:500;padding:4px 9px;border-radius:7px;white-space:nowrap;opacity:0;transition:.15s;pointer-events:none}
  .spec-chip .tip b{font-variant-numeric:tabular-nums}
  .spec-chip:hover .tip{opacity:1}
  .spec-scale{display:flex;justify-content:space-between;margin-top:11px;padding:0 4px;font-family:var(--mono);font-size:9.5px;color:var(--ink-4);text-transform:uppercase;letter-spacing:.06em}
  .spec-scale span{flex:1;text-align:center}.spec-scale span:first-child{text-align:left}.spec-scale span:last-child{text-align:right}
  .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px}
  .filter-pills{display:flex;gap:6px;background:var(--surface-2);border-radius:10px;padding:3px}
  .filter-pills button{background:none;border:none;font-family:inherit;font-size:13px;font-weight:500;color:var(--ink-2);
    padding:7px 13px;border-radius:8px;transition:.15s;display:flex;align-items:center;gap:6px;white-space:nowrap}
  .filter-pills button:hover{color:var(--ink)}
  .filter-pills button.on{background:var(--surface);color:var(--iris);box-shadow:0 1px 2px rgba(36,24,70,.06)}
  .filter-pills .cnt{font-family:var(--mono);font-size:11px;opacity:.7}
  .sortbox{display:flex;align-items:center;gap:7px;border:1px solid var(--line-2);border-radius:9px;padding:8px 12px;font-size:13px;color:var(--ink-2);background:var(--surface);cursor:pointer;white-space:nowrap}
  .sortbox svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none}
  .viewtoggle{display:flex;border:1px solid var(--line-2);border-radius:9px;overflow:hidden}
  .viewtoggle button{width:36px;height:36px;background:var(--surface);border:none;display:flex;align-items:center;justify-content:center;color:var(--ink-3);transition:.15s;border-left:1px solid var(--line-2)}
  .viewtoggle button:first-child{border-left:none}
  .viewtoggle button.on{background:var(--i50);color:var(--iris)}
  .viewtoggle svg{width:17px;height:17px;stroke:currentColor;stroke-width:1.8;fill:none}

  /* grid */
  .agrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  @media(max-width:1000px){.agrid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:640px){.agrid{grid-template-columns:1fr}}
  .acard{background:var(--surface);border:1px solid var(--line-2);border-radius:var(--r-lg);padding:18px;transition:.18s;position:relative;overflow:hidden}
  .acard:hover{transform:translateY(-3px);border-color:var(--iris)}
  .acard.neg{border-color:#F0CFCB}
  .acard .topr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
  .ac-ic{width:42px;height:42px;border-radius:11px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:20px}
  .acard.neg .ac-ic{background:var(--h-crit-s)}
  .ac-nm{font-size:16px;font-weight:600;letter-spacing:-.01em}
  .ac-desc{font-size:13px;color:var(--ink-3);margin-top:2px}
  .ac-status{display:flex;align-items:center;gap:8px;margin-top:13px}
  .ac-vis{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px;min-height:22px}
  .ac-foot{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:13px;border-top:1px solid var(--line)}
  .ac-foot .m{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ink-3)}
  .ac-foot .m svg{width:13px;height:13px;stroke:currentColor;stroke-width:1.8;fill:none}
  /* hover quick actions */
  .qa{position:absolute;inset:auto 0 0 0;background:linear-gradient(0deg,var(--surface) 60%,transparent);
    padding:14px;display:flex;gap:7px;transform:translateY(100%);opacity:0;transition:.2s}
  .acard:hover .qa{transform:none;opacity:1}
  .qa button{flex:1;font-size:12.5px;font-weight:500;border:1px solid var(--line-2);background:var(--surface);
    color:var(--ink-2);border-radius:8px;padding:8px 4px;transition:.15s;display:flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap}
  .qa button:hover{border-color:var(--iris);color:var(--iris)}
  .qa button.pri{background:var(--iris);color:#fff;border-color:var(--iris)}
  .qa button.pri:hover{background:var(--i600)}
  .qa svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none}
  .neg-pulse{position:absolute;top:16px;left:50px;width:8px;height:8px;border-radius:50%;background:var(--h-crit);animation:pulse 2s infinite}

  /* list view */
  .alist{display:none;flex-direction:column;border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;background:var(--surface)}
  .alist.show{display:flex}.agrid.hide{display:none}
  .lrow{display:flex;align-items:center;gap:16px;padding:14px 18px;border-top:1px solid var(--line);transition:.15s}
  .lrow:first-child{border-top:none}
  .lrow:hover{background:var(--surface-2)}
  .lrow .ic{width:34px;height:34px;border-radius:9px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
  .lrow .nmwrap{width:180px;flex-shrink:0}
  .lrow .nmwrap .n{font-size:14.5px;font-weight:500}
  .lrow .nmwrap .d{font-size:12px;color:var(--ink-3)}
  .lrow .visc{flex:1;display:flex;gap:5px;flex-wrap:wrap}
  .lrow .meta{display:flex;align-items:center;gap:20px;font-size:12.5px;color:var(--ink-3);white-space:nowrap}
  .lrow .meta .tnum{font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div class="app"></div>

<template id="tpl-main">
  <div class="areas-head">
    <div><h1>Alanların</h1><div class="sub">8 alan · ortalama skor <b style="color:var(--ink-2);font-variant-numeric:tabular-nums">54</b> · 1 ihmal edilen</div></div>
    <button class="btn pri" id="newAreaBtn"></button>
  </div>
  <div class="spectrum">
    <div class="spec-h"><h2>Denge Spektrumu</h2><span class="sx">Her alan skoruna göre yerleşti — soldan sağa iyileşiyor</span></div>
    <div class="spec-track" id="specTrack"></div>
    <div class="spec-scale"><span>Kritik 0</span><span>Uyarı 30</span><span>İyi 50</span><span>Mükemmel 70–100</span></div>
  </div>
  <div class="toolbar">
    <div class="filter-pills">
      <button class="on" data-f="all">Tümü <span class="cnt">8</span></button>
      <button data-f="healthy">Sağlıklı <span class="cnt">4</span></button>
      <button data-f="attention">Dikkat <span class="cnt">3</span></button>
      <button data-f="neglected">İhmal <span class="cnt">1</span></button>
    </div>
    <div class="spacer"></div>
    <div class="sortbox" id="sortBox"></div>
    <div class="viewtoggle">
      <button class="on" id="gridBtn"></button>
      <button id="listBtn"></button>
    </div>
  </div>
  <div class="agrid" id="agrid"></div>
  <div class="alist" id="alist"></div>
</template>

<template id="tpl-empty">
  <div class="state-block">
    <div class="state-art" id="emptyArt"></div>
    <h2>Henüz alanın yok.</h2>
    <p>Bir şablondan başla veya kendi alanını yarat. Sağlık, Kariyer, İlişkiler, Hayaller — neyi düzenli takip etmek istersin?</p>
    <div class="state-actions">
      <a class="btn pri lg" href="01-onboarding.html">Şablonlardan başla</a>
      <a class="state-link" href="#">Boş alan oluştur</a>
    </div>
  </div>
</template>

<template id="tpl-error">
  <div class="state-block">
    <div class="state-art" id="errArt"></div>
    <h2>Alanlar yüklenemedi.</h2>
    <p>Sunucuya ulaşamıyoruz. Birkaç saniye sonra tekrar dene.</p>
    <div class="state-actions">
      <button class="btn pri lg" onclick="this.textContent='Deneniyor…';setTimeout(()=>location.reload(),900)">Tekrar dene</button>
      <a class="state-link" href="#">Sorunu bildir</a>
    </div>
  </div>
</template>

<script src="../assets/lifeos.js"></script>
<script src="../assets/data.js"></script>
<script>
  const content=LifeOS.shell({active:'areas',title:'Areas',crumb:'Çalışma alanı'});

  function visTags(a){return a.visions.map(v=>`<span class="tag"><span class="sw" style="background:var(--iris)"></span>${v}</span>`).join('')||'<span style="font-size:11.5px;color:var(--ink-4)">Hayal bağlı değil</span>';}

  function buildSpectrum(){
    const t=document.getElementById('specTrack');
    t.innerHTML=LifeData.areas.map((a,i)=>{const h=LifeOS.healthColor(a.score);
      const top=i%2===0?34:66;
      return `<div class="spec-chip" style="left:${a.score}%;top:${top}%;--col:${h.c}" onclick="location.href='04-area-detail.html'">
        <span class="tip">${a.name} · <b>${a.score}</b></span><div class="ci">${a.icon}</div></div>`;}).join('');
  }

  function cardHTML(a){
    return `<div class="acard ${a.neglected?'neg':''}">
      ${a.neglected?'<span class="neg-pulse"></span>':''}
      <div class="topr">
        <div class="ac-ic">${a.icon}</div>
        ${LifeOS.ring(a.score,56,6,{fontSize:18})}
      </div>
      <div class="ac-nm">${a.name}</div>
      <div class="ac-desc">${a.desc}</div>
      <div class="ac-vis">${visTags(a)}</div>
      <div class="ac-foot">
        <span class="m">${LifeOS.icon('tasks')} ${a.tasks} görev</span>
        <span class="m">${LifeOS.icon('clock')} ${a.last}</span>
      </div>
      <div class="qa">
        <button class="pri" onclick="event.stopPropagation();LifeOS.create('task')">${LifeOS.icon('plus')} Görev</button>
        <button onclick="event.stopPropagation();LifeOS.toast('${a.name}: +5 puan, skor güncellendi')">${LifeOS.icon('check')} Aktivite</button>
        <button onclick="location.href='04-area-detail.html'">${LifeOS.icon('arrow')} Detay</button>
      </div>
    </div>`;
  }
  function rowHTML(a){
    return `<div class="lrow">
      <div class="ic">${a.icon}</div>
      <div class="nmwrap"><div class="n">${a.name}</div><div class="d">${a.desc}</div></div>
      <div class="visc">${visTags(a)}</div>
      <div class="meta">
        <span>${a.tasks} görev</span>
        <span class="tnum">${a.last}</span>
        ${LifeOS.ring(a.score,40,5,{sub:false,fontSize:13})}
      </div>
    </div>`;
  }

  function mountMain(){
    content.innerHTML='';content.appendChild(document.getElementById('tpl-main').content.cloneNode(true));
    document.getElementById('newAreaBtn').innerHTML=LifeOS.icon('plus')+' Yeni alan';
    document.getElementById('sortBox').innerHTML=LifeOS.icon('filter')+' Sırala: Skora göre '+LifeOS.icon('chevrond');
    buildSpectrum();
    document.getElementById('gridBtn').innerHTML=LifeOS.icon('grid');
    document.getElementById('listBtn').innerHTML=LifeOS.icon('list');
    document.getElementById('agrid').innerHTML=LifeData.areas.map(cardHTML).join('');
    document.getElementById('alist').innerHTML=LifeData.areas.map(rowHTML).join('');
    // view toggle
    document.getElementById('gridBtn').onclick=()=>{document.getElementById('agrid').classList.remove('hide');document.getElementById('alist').classList.remove('show');document.getElementById('gridBtn').classList.add('on');document.getElementById('listBtn').classList.remove('on');};
    document.getElementById('listBtn').onclick=()=>{document.getElementById('agrid').classList.add('hide');document.getElementById('alist').classList.add('show');document.getElementById('listBtn').classList.add('on');document.getElementById('gridBtn').classList.remove('on');};
    // filter
    document.querySelectorAll('.filter-pills button').forEach(b=>b.onclick=()=>{
      document.querySelectorAll('.filter-pills button').forEach(x=>x.classList.toggle('on',x===b));
      const f=b.dataset.f;
      const filt=LifeData.areas.filter(a=> f==='all'?true : f==='healthy'?a.score>=70 : f==='attention'?(a.score>=30&&a.score<70&&!a.neglected) : a.neglected||a.score<30 );
      document.getElementById('agrid').innerHTML=filt.map(cardHTML).join('');
      document.getElementById('alist').innerHTML=filt.map(rowHTML).join('');
    });
  }
  function mountEmpty(){content.innerHTML='';content.appendChild(document.getElementById('tpl-empty').content.cloneNode(true));
    document.getElementById('emptyArt').innerHTML=`<svg viewBox="0 0 96 96" fill="none"><rect x="14" y="20" width="30" height="24" rx="5" fill="#E8FAF7" stroke="#A2E9DF" stroke-width="2"/><rect x="52" y="20" width="30" height="24" rx="5" stroke="#A2E9DF" stroke-width="2" stroke-dasharray="4 5"/><rect x="14" y="52" width="30" height="24" rx="5" stroke="#A2E9DF" stroke-width="2" stroke-dasharray="4 5"/><rect x="52" y="52" width="30" height="24" rx="5" stroke="#A2E9DF" stroke-width="2" stroke-dasharray="4 5"/><path d="M67 64h0M67 60v8M63 64h8" stroke="#0BA99B" stroke-width="2.4" stroke-linecap="round"/></svg>`;}
  function mountError(){content.innerHTML='';content.appendChild(document.getElementById('tpl-error').content.cloneNode(true));
    document.getElementById('errArt').innerHTML=`<svg viewBox="0 0 96 96" fill="none"><path d="M20 56a14 14 0 0 1 8-25 18 18 0 0 1 34 3 12 12 0 0 1 4 22z" stroke="#D2524A" stroke-width="2.2" fill="#FBE7E5"/><path d="M48 44v10M48 62h.01" stroke="#D2524A" stroke-width="2.8" stroke-linecap="round"/></svg>`;}

  LifeOS.stateSwitch([{id:'main',label:'Ana hal'},{id:'empty',label:'Boş'},{id:'error',label:'Hata'}]);
  const sw=document.querySelector('.state-switch');
  sw.querySelectorAll('button').forEach(b=>b.onclick=()=>{sw.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));({main:mountMain,empty:mountEmpty,error:mountError})[b.dataset.st]();});
  mountMain();
</script>
</body>
</html>
