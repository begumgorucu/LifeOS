<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeOS — Settings</title>
<link rel="stylesheet" href="../assets/lifeos.css">
<style>
  .set-wrap{display:grid;grid-template-columns:200px 1fr;gap:32px;align-items:start}
  @media(max-width:820px){.set-wrap{grid-template-columns:1fr}}
  .set-nav{position:sticky;top:80px;display:flex;flex-direction:column;gap:2px}
  .set-nav a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;color:var(--ink-2);font-size:14px;font-weight:500;text-decoration:none;transition:.15s}
  .set-nav a svg{width:16px;height:16px;stroke:currentColor;stroke-width:1.8;fill:none}
  .set-nav a:hover{background:var(--surface-2);color:var(--ink)}
  .set-nav a.on{background:var(--i50);color:var(--iris)}

  .set-content{max-width:620px}
  .set-sec{margin-bottom:34px}
  .set-sec h2{font-size:18px;font-weight:600;letter-spacing:-.01em;margin-bottom:4px}
  .set-sec .sd{font-size:13.5px;color:var(--ink-3);margin-bottom:18px}
  .set-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden}
  .set-row{display:flex;align-items:center;gap:16px;padding:16px 18px;border-top:1px solid var(--line)}
  .set-row:first-child{border-top:none}
  .set-row .info{flex:1;min-width:0}
  .set-row .info .t{font-size:14px;font-weight:500}
  .set-row .info .d{font-size:12.5px;color:var(--ink-3);margin-top:2px}

  /* profile */
  .prof-avatar{width:60px;height:60px;border-radius:50%;background:linear-gradient(140deg,var(--i300),var(--i600));
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:24px;flex-shrink:0}
  .field-sm{border:1px solid var(--line-2);border-radius:8px;padding:9px 12px;font-size:14px;background:var(--surface);color:var(--ink);font-family:inherit;width:220px}
  .field-sm:focus{outline:none;border-color:var(--iris);box-shadow:0 0 0 3px var(--i50)}

  /* theme switch */
  .theme-opts{display:flex;gap:12px}
  .theme-opt{flex:1;border:1.5px solid var(--line-2);border-radius:12px;padding:14px;cursor:pointer;transition:.18s;text-align:center}
  .theme-opt:hover{border-color:var(--line-3)}
  .theme-opt.on{border-color:var(--iris);box-shadow:0 0 0 3px var(--i50)}
  .theme-prev{height:60px;border-radius:8px;margin-bottom:10px;position:relative;overflow:hidden;border:1px solid var(--line)}
  .theme-prev .bar{position:absolute;top:8px;left:8px;right:8px;height:8px;border-radius:3px}
  .theme-prev .dot{position:absolute;bottom:8px;left:8px;width:18px;height:18px;border-radius:5px}
  .theme-opt .tl{font-size:13px;font-weight:500}
  .prev-light{background:#F8FBFB}.prev-light .bar{background:#CFF4EE}.prev-light .dot{background:#0BA99B}
  .prev-dark{background:#0F1A18}.prev-dark .bar{background:#2F413E}.prev-dark .dot{background:#4FD6C6}
  .prev-sys{background:linear-gradient(90deg,#F8FBFB 50%,#0F1A18 50%)}.prev-sys .bar{background:linear-gradient(90deg,#CFF4EE 50%,#2F413E 50%)}.prev-sys .dot{background:#0BA99B}

  /* toggle */
  .toggle{width:42px;height:24px;border-radius:13px;background:var(--line-2);position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
  .toggle.on{background:var(--iris)}
  .toggle::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s}
  .toggle.on::after{left:21px}
  .seg-sm{display:inline-flex;background:var(--surface-2);border-radius:8px;padding:3px}
  .seg-sm button{background:none;border:none;font-family:inherit;font-size:13px;font-weight:500;color:var(--ink-2);padding:6px 14px;border-radius:6px;transition:.15s}
  .seg-sm button.on{background:var(--surface);color:var(--iris);box-shadow:0 1px 2px rgba(36,24,70,.06)}
  .time-input{border:1px solid var(--line-2);border-radius:8px;padding:8px 12px;font-family:var(--mono);font-size:14px;background:var(--surface);color:var(--ink)}
  .btn-danger{background:var(--h-crit-s);color:var(--h-crit-d);border:1px solid transparent;border-radius:8px;padding:8px 14px;font-size:13.5px;font-weight:500}
  .btn-danger:hover{background:var(--h-crit);color:#fff}
  .ver{font-family:var(--mono);font-size:12px;color:var(--ink-4)}
</style>
</head>
<body>
<div class="app"></div>

<template id="tpl-main">
  <div class="page-head" style="margin-bottom:24px"><h1 style="font-size:26px">Ayarlar</h1></div>
  <div class="set-wrap">
    <nav class="set-nav" id="setNav"></nav>
    <div class="set-content">
      <!-- profile -->
      <div class="set-sec" id="profile">
        <h2>Profil</h2><div class="sd">Hesap bilgilerin</div>
        <div class="set-card">
          <div class="set-row">
            <div class="prof-avatar">B</div>
            <div class="info"><div class="t">Begüm Yılmaz</div><div class="d">Seviye 4 · Kâşif · 2.450 XP</div></div>
            <button class="btn sec sm">Fotoğraf değiştir</button>
          </div>
          <div class="set-row"><div class="info"><div class="t">İsim</div></div><input class="field-sm" value="Begüm Yılmaz"></div>
          <div class="set-row"><div class="info"><div class="t">E-posta</div></div><input class="field-sm" value="begum@lifeos.app"></div>
        </div>
      </div>

      <!-- appearance -->
      <div class="set-sec" id="theme">
        <h2>Görünüm</h2><div class="sd">Temayı seç — değişiklik anında uygulanır</div>
        <div class="theme-opts" id="themeOpts">
          <div class="theme-opt on" data-th=""><div class="theme-prev prev-light"><span class="bar"></span><span class="dot"></span></div><div class="tl">Açık</div></div>
          <div class="theme-opt" data-th="dark"><div class="theme-prev prev-dark"><span class="bar"></span><span class="dot"></span></div><div class="tl">Koyu</div></div>
          <div class="theme-opt" data-th="system"><div class="theme-prev prev-sys"><span class="bar"></span><span class="dot"></span></div><div class="tl">Sistem</div></div>
        </div>
      </div>

      <!-- language -->
      <div class="set-sec" id="lang">
        <h2>Dil</h2><div class="sd">Uygulama dili</div>
        <div class="set-card"><div class="set-row">
          <div class="info"><div class="t">Görüntüleme dili</div><div class="d">Türkçe / English</div></div>
          <div class="seg-sm"><button class="on">Türkçe</button><button>English</button></div>
        </div></div>
      </div>

      <!-- notifications -->
      <div class="set-sec" id="notif">
        <h2>Bildirimler</h2><div class="sd">Ne zaman ve nasıl hatırlatalım</div>
        <div class="set-card">
          <div class="set-row"><div class="info"><div class="t">Günlük hatırlatma</div><div class="d">Her sabah günü planlama hatırlatıcısı</div></div><input class="time-input" type="time" value="07:30"></div>
          <div class="set-row"><div class="info"><div class="t">İhmal uyarıları</div><div class="d">Bir alan 7+ gün ihmal edilince</div></div><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
          <div class="set-row"><div class="info"><div class="t">Streak riski</div><div class="d">Gün bitmeden görev yapmadıysan</div></div><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
          <div class="set-row"><div class="info"><div class="t">E-posta özeti</div><div class="d">Haftalık ilerleme e-postası</div></div><div class="toggle" onclick="this.classList.toggle('on')"></div></div>
          <div class="set-row"><div class="info"><div class="t">Push bildirimleri</div><div class="d">Mobil cihaz bildirimleri</div></div><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
        </div>
      </div>

      <!-- data -->
      <div class="set-sec" id="data">
        <h2>Veri</h2><div class="sd">Verilerini dışa aktar veya hesabını yönet</div>
        <div class="set-card">
          <div class="set-row"><div class="info"><div class="t">Verileri dışa aktar</div><div class="d">Tüm alanların, görevlerin, hayallerin (JSON)</div></div><button class="btn sec sm" id="expBtn"></button></div>
          <div class="set-row"><div class="info"><div class="t">İçe aktar</div><div class="d">Yedekten geri yükle</div></div><button class="btn sec sm" id="impBtn"></button></div>
          <div class="set-row"><div class="info"><div class="t" style="color:var(--h-crit-d)">Hesabı sil</div><div class="d">Bu işlem geri alınamaz</div></div><button class="btn-danger">Hesabı sil</button></div>
        </div>
      </div>

      <!-- about -->
      <div class="set-sec" id="about">
        <h2>Hakkında</h2><div class="sd">Uygulama bilgisi</div>
        <div class="set-card">
          <div class="set-row"><div class="info"><div class="t">Sürüm</div></div><span class="ver">LifeOS v1.0.0 (build 2026.06)</span></div>
          <div class="set-row"><div class="info"><div class="t">Geri bildirim gönder</div><div class="d">Fikir veya hata bildir</div></div><button class="btn sec sm">Geri bildirim</button></div>
          <div class="set-row"><div class="info"><div class="t">Klavye kısayolları</div><div class="d">? tuşuna basarak görüntüle</div></div><span class="ver">?</span></div>
        </div>
      </div>
    </div>
  </div>
</template>

<template id="tpl-empty">
  <div class="page-head" style="margin-bottom:24px"><h1 style="font-size:26px">Ayarlar</h1></div>
  <div class="state-block">
    <div class="state-art" id="emptyArt"></div>
    <h2>Profilini tamamla.</h2>
    <p>Henüz profil bilgini eklemedin. İsim ve e-posta ekleyerek başla — böylece ilerlemen cihazlar arası senkronize olur.</p>
    <div class="state-actions"><button class="btn pri lg" id="fillBtn">Profili doldur</button></div>
  </div>
</template>

<template id="tpl-error">
  <div class="page-head" style="margin-bottom:24px"><h1 style="font-size:26px">Ayarlar</h1></div>
  <div class="state-block">
    <div class="state-art" id="errArt"></div>
    <h2>Ayarlar kaydedilemedi.</h2>
    <p>Son değişikliğin sunucuya ulaşmadı. Bağlantını kontrol edip tekrar dene.</p>
    <div class="state-actions"><button class="btn pri lg" onclick="this.textContent='Deneniyor…';setTimeout(()=>location.reload(),900)">Tekrar dene</button><a class="state-link" href="#">Sorunu bildir</a></div>
  </div>
</template>

<div class="toast" id="toast" style="display:none"></div>

<script src="../assets/lifeos.js"></script>
<script src="../assets/data.js"></script>
<script>
  const content=LifeOS.shell({active:'settings',title:'Settings'});

  function toast(msg){const t=document.getElementById('toast');t.innerHTML=LifeOS.icon('check')+' '+msg;t.style.display='flex';
    clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',1800);}

  function mountMain(){
    content.innerHTML='';content.appendChild(document.getElementById('tpl-main').content.cloneNode(true));
    const nav=[['profile','user','Profil'],['theme','moon','Görünüm'],['lang','globe','Dil'],['notif','bell','Bildirimler'],['data','download','Veri'],['about','info','Hakkında']];
    document.getElementById('setNav').innerHTML=nav.map((n,i)=>`<a class="${i===0?'on':''}" href="#${n[0]}" onclick="setActive(this)">${LifeOS.icon(n[1])} ${n[2]}</a>`).join('');
    document.getElementById('expBtn').innerHTML=LifeOS.icon('download')+' İndir';
    document.getElementById('impBtn').innerHTML=LifeOS.icon('upload')+' Seç';
    // theme switch
    document.querySelectorAll('.theme-opt').forEach(o=>o.onclick=()=>{
      document.querySelectorAll('.theme-opt').forEach(x=>x.classList.toggle('on',x===o));
      const th=o.dataset.th;
      document.documentElement.dataset.theme = th==='system'? (window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'') : th;
      toast(th==='dark'?'Koyu tema açıldı':th==='system'?'Sistem temasına geçildi':'Açık tema açıldı');
    });
    document.getElementById('expBtn').onclick=()=>toast('Veriler hazırlanıyor…');
  }
  window.setActive=el=>{document.querySelectorAll('.set-nav a').forEach(a=>a.classList.toggle('on',a===el));};

  function mountEmpty(){content.innerHTML='';content.appendChild(document.getElementById('tpl-empty').content.cloneNode(true));
    document.getElementById('emptyArt').innerHTML=`<svg viewBox="0 0 96 96" fill="none"><circle cx="48" cy="38" r="14" fill="#E8FAF7" stroke="#A2E9DF" stroke-width="2"/><path d="M24 74a24 24 0 0 1 48 0" fill="#E8FAF7" stroke="#A2E9DF" stroke-width="2"/><path d="M62 30l4 4M66 30l-4 4" stroke="#0BA99B" stroke-width="2.2" stroke-linecap="round"/></svg>`;}
  function mountError(){content.innerHTML='';content.appendChild(document.getElementById('tpl-error').content.cloneNode(true));
    document.getElementById('errArt').innerHTML=`<svg viewBox="0 0 96 96" fill="none"><circle cx="48" cy="48" r="30" fill="#FBE7E5"/><path d="M48 34v18M48 60h.01" stroke="#D2524A" stroke-width="3.2" stroke-linecap="round"/></svg>`;}

  LifeOS.stateSwitch([{id:'main',label:'Ana hal'},{id:'empty',label:'Boş'},{id:'error',label:'Hata'}]);
  const sw=document.querySelector('.state-switch');
  sw.querySelectorAll('button').forEach(b=>b.onclick=()=>{sw.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));({main:mountMain,empty:mountEmpty,error:mountError})[b.dataset.st]();});
  mountMain();
</script>
</body>
</html>
